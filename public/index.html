<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>BURN · 阅后即焚</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #0a0a0f;
    --bg-deep: #0f0f18;
    --bg-card: #16162488;
    --accent-red: #ff2d55;
    --accent-amber: #ffb800;
    --accent-green: #00ff88;
    --accent-cyan: #00e5ff;
    --text-primary: #e8e6f0;
    --text-dim: #6b6880;
    --glow-red: 0 0 20px #ff2d5544, 0 0 60px #ff2d5522;
    --glow-green: 0 0 15px #00ff8844;
    --border-subtle: #ffffff0a;
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
    --safe-area-top: env(safe-area-inset-top, 0px);
    --safe-area-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-sans);
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 20%, #ff2d5508, transparent),
      radial-gradient(ellipse 500px 500px at 80% 80%, #00e5ff06, transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== 登录页面 ===== */
  .auth-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    background: var(--bg-void);
    padding: var(--safe-area-top) 0 var(--safe-area-bottom) 0;
  }

  .auth-card {
    width: 100%;
    max-width: 380px;
    padding: 40px 24px;
    padding-top: calc(40px + var(--safe-area-top));
    padding-bottom: calc(40px + var(--safe-area-bottom));
  }

  .auth-logo { text-align: center; margin-bottom: 32px; }

  .auth-logo-icon {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, var(--accent-red), #ff6b35);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 16px;
    box-shadow: var(--glow-red);
  }

  .auth-logo-text {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 6px;
    background: linear-gradient(90deg, var(--accent-red), var(--accent-amber));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .auth-logo-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-top: 6px;
  }

  .auth-tabs {
    display: flex;
    margin-bottom: 24px;
    background: #ffffff06;
    border-radius: 10px;
    padding: 4px;
  }

  .auth-tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-dim);
    transition: all 0.2s;
  }

  .auth-tab.active {
    background: var(--accent-red);
    color: white;
    box-shadow: var(--glow-red);
  }

  .auth-form { display: flex; flex-direction: column; gap: 16px; }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 1px;
    font-family: var(--font-mono);
  }

  .form-input {
    width: 100%;
    padding: 14px 16px;
    background: #ffffff06;
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus {
    border-color: var(--accent-cyan)66;
    box-shadow: 0 0 15px #00e5ff22;
  }

  .avatar-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .avatar-option {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    background: #ffffff08;
  }

  .avatar-option.selected {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 10px #00e5ff44;
  }

  .auth-btn {
    padding: 16px;
    background: linear-gradient(135deg, var(--accent-red), #ff6b35);
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .auth-btn:active { transform: scale(0.98); }
  .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .auth-error {
    background: #ff2d5522;
    border: 1px solid #ff2d5544;
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    color: var(--accent-red);
    margin-bottom: 16px;
    display: none;
  }

  .auth-error.show { display: block; }

  /* ===== 主应用 ===== */
  .app-container {
    display: none;
    position: relative;
    z-index: 1;
    height: 100%;
    flex-direction: column;
  }

  .app-container.show { display: flex; }

  /* 顶部导航 */
  .top-nav {
    padding: 12px 16px;
    padding-top: calc(12px + var(--safe-area-top));
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-logo {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent-red), #ff6b35);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .nav-text {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .nav-status {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent-green);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .nav-dot {
    width: 6px;
    height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* 用户列表 */
  .users-section {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    padding-bottom: calc(8px + var(--safe-area-bottom) + 80px);
  }

  .section-title {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 12px 8px 8px;
    font-family: var(--font-mono);
  }

  .user-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: var(--bg-deep);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .user-card:active {
    transform: scale(0.98);
    border-color: var(--accent-red)44;
    background: #ff2d5510;
  }

  .user-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    position: relative;
    flex-shrink: 0;
  }

  .user-avatar.online::after {
    content: '';
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background: var(--accent-green);
    border-radius: 50%;
    border: 2px solid var(--bg-deep);
    box-shadow: var(--glow-green);
  }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .user-preview { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }

  .user-badge {
    padding: 4px 10px;
    background: var(--accent-green)22;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--accent-green);
  }

  /* 底部导航 */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px 16px;
    padding-bottom: calc(8px + var(--safe-area-bottom));
    background: var(--bg-deep);
    border-top: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-around;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 16px;
    color: var(--text-dim);
    font-size: 10px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .nav-item.active { color: var(--accent-red); }
  .nav-item-icon { font-size: 22px; }

  /* 聊天页面 */
  .chat-screen {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .chat-screen.show { display: flex; }

  .chat-header {
    padding: 12px 16px;
    padding-top: calc(12px + var(--safe-area-top));
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--text-dim);
    cursor: pointer;
  }

  .chat-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .chat-info { flex: 1; }
  .chat-name { font-size: 15px; font-weight: 600; }
  .chat-status { font-family: var(--font-mono); font-size: 10px; color: var(--accent-green); }

  .burn-selector {
    display: flex;
    gap: 4px;
  }

  .burn-btn {
    padding: 6px 10px;
    background: #ffffff06;
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .burn-btn.active {
    border-color: var(--accent-red);
    color: var(--accent-red);
    background: #ff2d5515;
  }

  /* 消息区 */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg-row {
    display: flex;
    max-width: 80%;
    animation: msgIn 0.3s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.sent { align-self: flex-end; }
  .msg-row.received { align-self: flex-start; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
  }

  .msg-row.sent .msg-bubble {
    background: linear-gradient(135deg, #ff2d5522, #ff6b3522);
    border: 1px solid #ff2d5533;
    border-bottom-right-radius: 4px;
  }

  .msg-row.received .msg-bubble {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-bottom-left-radius: 4px;
  }

  .msg-meta {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    align-items: center;
  }

  .msg-time {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
  }

  .msg-burn {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--accent-amber);
  }

  .msg-burn.burning { color: var(--accent-red); animation: flash 0.8s infinite; }

  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .msg-bubble.burning {
    animation: burn 1.2s forwards;
  }

  @keyframes burn {
    0% { opacity: 1; filter: none; }
    30% { filter: brightness(1.5) saturate(2); background: linear-gradient(135deg, #ff2d5566, #ff6b3566); }
    60% { filter: brightness(2) blur(1px); opacity: 0.6; }
    100% { opacity: 0; filter: blur(8px); max-height: 0; padding: 0; margin: 0; overflow: hidden; }
  }

  /* 输入区 */
  .chat-input-area {
    padding: 12px 16px;
    padding-bottom: calc(12px + var(--safe-area-bottom));
    background: #0f0f1888;
    border-top: 1px solid var(--border-subtle);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    padding: 14px 16px;
    background: #ffffff08;
    border: 1px solid var(--border-subtle);
    border-radius: 22px;
    color: var(--text-primary);
    font-size: 15px;
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    line-height: 1.4;
  }

  .send-btn {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent-red), #ff6b35);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* 空状态 */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    padding: 40px;
    text-align: center;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-text { font-size: 14px; line-height: 1.6; }
  .empty-hint { font-size: 11px; margin-top: 12px; color: var(--accent-cyan); font-family: var(--font-mono); }

  /* 系统消息 */
  .system-msg {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    padding: 8px;
  }

  /* 设置页面 */
  .settings-screen {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .settings-screen.show { display: flex; }

  .settings-header {
    padding: 16px;
    padding-top: calc(16px + var(--safe-area-top));
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border-subtle);
  }

  .settings-title {
    font-size: 18px;
    font-weight: 600;
  }

  .settings-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: calc(16px + var(--safe-area-bottom) + 80px);
  }

  .settings-card {
    background: var(--bg-deep);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .settings-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .settings-item:last-child { border-bottom: none; }

  .settings-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: #ffffff08;
  }

  .settings-label { flex: 1; font-size: 14px; }
  .settings-value { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }

  .logout-btn {
    width: 100%;
    padding: 16px;
    background: #ff2d5515;
    border: 1px solid #ff2d5544;
    border-radius: 14px;
    color: var(--accent-red);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 20px;
  }

  /* 服务器配置 */
  .server-config {
    background: var(--bg-deep);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .server-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-family: var(--font-mono);
  }

  .server-input {
    width: 100%;
    padding: 12px;
    background: #ffffff06;
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: var(--font-mono);
  }

  .server-save-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent-cyan), #00b8d4);
    border: none;
    border-radius: 10px;
    color: var(--bg-void);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
  }
</style>
</head>
<body>

<!-- 登录页面 -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🔥</div>
      <div class="auth-logo-text">BURN</div>
      <div class="auth-logo-sub">AUTO-DESTROY CHAT</div>
    </div>

    <div class="auth-error" id="authError"></div>

    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">登录</div>
      <div class="auth-tab" data-tab="register">注册</div>
    </div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" class="form-input" id="loginUsername" placeholder="输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="输入密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="auth-btn">登录</button>
    </form>

    <form class="auth-form" id="registerForm" style="display:none">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" class="form-input" id="regUsername" placeholder="2-20字符" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" class="form-input" id="regPassword" placeholder="设置密码" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>头像</label>
        <div class="avatar-picker" id="avatarPicker">
          <div class="avatar-option selected" data-avatar="👤">👤</div>
          <div class="avatar-option" data-avatar="🦇">🦇</div>
          <div class="avatar-option" data-avatar="🕊️">🕊️</div>
          <div class="avatar-option" data-avatar="⚙️">⚙️</div>
          <div class="avatar-option" data-avatar="🎭">🎭</div>
          <div class="avatar-option" data-avatar="🔮">🔮</div>
          <div class="avatar-option" data-avatar="🛡️">🛡️</div>
          <div class="avatar-option" data-avatar="⚡">⚡</div>
        </div>
      </div>
      <button type="submit" class="auth-btn">创建账号</button>
    </form>
  </div>
</div>

<!-- 主应用 -->
<div class="app-container" id="appContainer">
  <!-- 顶部导航 -->
  <div class="top-nav">
    <div class="nav-title">
      <div class="nav-logo">🔥</div>
      <div class="nav-text">BURN</div>
    </div>
    <div class="nav-status">
      <span class="nav-dot"></span>
      <span id="onlineCount">0</span> 在线
    </div>
  </div>

  <!-- 用户列表页面 -->
  <div class="users-screen" id="usersScreen">
    <div class="users-section" id="usersSection">
      <div class="section-title">在线用户</div>
      <div id="userList"></div>
    </div>
  </div>

  <!-- 聊天页面 -->
  <div class="chat-screen" id="chatScreen">
    <div class="chat-header">
      <div class="back-btn" id="backBtn">‹</div>
      <div class="chat-avatar" id="chatAvatar">👤</div>
      <div class="chat-info">
        <div class="chat-name" id="chatName">用户</div>
        <div class="chat-status" id="chatStatus">● 在线</div>
      </div>
      <div class="burn-selector">
        <button class="burn-btn" data-time="5">5s</button>
        <button class="burn-btn active" data-time="10">10s</button>
        <button class="burn-btn" data-time="30">30s</button>
        <button class="burn-btn" data-time="60">60s</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
      <div class="input-row">
        <textarea class="chat-input" id="chatInput" placeholder="输入加密消息..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>➤</button>
      </div>
    </div>
  </div>

  <!-- 设置页面 -->
  <div class="settings-screen" id="settingsScreen">
    <div class="settings-header">
      <div class="settings-title">设置</div>
    </div>
    <div class="settings-content">
      <div class="server-config">
        <div class="server-label">服务器地址</div>
        <input type="text" class="server-input" id="serverUrl" placeholder="http://192.168.1.100:3000">
        <button class="server-save-btn" id="saveServerBtn">保存并重连</button>
      </div>

      <div class="settings-card">
        <div class="settings-item">
          <div class="settings-icon">👤</div>
          <div class="settings-label">当前账号</div>
          <div class="settings-value" id="settingsUsername">-</div>
        </div>
        <div class="settings-item">
          <div class="settings-icon">🔒</div>
          <div class="settings-label">加密状态</div>
          <div class="settings-value">E2E</div>
        </div>
      </div>

      <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item active" data-screen="users">
      <span class="nav-item-icon">💬</span>
      <span>聊天</span>
    </div>
    <div class="nav-item" data-screen="settings">
      <span class="nav-item-icon">⚙️</span>
      <span>设置</span>
    </div>
  </div>
</div>

<script>
// ===== 状态 =====
let currentUser = null;
let ws = null;
let onlineUsers = [];
let activeChat = null;
let burnTime = 10;
let messageTimers = {};
let selectedAvatar = '👤';
let serverUrl = localStorage.getItem('burnchat_server') || '';

// ===== DOM =====
const authScreen = document.getElementById('authScreen');
const appContainer = document.getElementById('appContainer');
const authError = document.getElementById('authError');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const usersScreen = document.getElementById('usersScreen');
const chatScreen = document.getElementById('chatScreen');
const settingsScreen = document.getElementById('settingsScreen');
const bottomNav = document.getElementById('bottomNav');

// ===== 工具函数 =====
function getApiBase() {
  if (serverUrl) return serverUrl;
  // APP 模式下使用相对路径（Capacitor 会处理）
  if (window.Capacitor) return '';
  return ''; // 默认同源
}

function getWsUrl() {
  if (serverUrl) {
    return serverUrl.replace(/^http/, 'ws');
  }
  if (window.Capacitor) {
    // Capacitor 打包的 APP，需要配置服务器地址
    return localStorage.getItem('burnchat_ws') || '';
  }
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${protocol}//${location.host}`;
}

// ===== 标签切换 =====
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const isLogin = tab.dataset.tab === 'login';
    loginForm.style.display = isLogin ? 'flex' : 'none';
    registerForm.style.display = isLogin ? 'none' : 'flex';
    authError.classList.remove('show');
  });
});

// ===== 头像选择 =====
document.querySelectorAll('.avatar-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedAvatar = opt.dataset.avatar;
  });
});

// ===== 底部导航 =====
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const screen = item.dataset.screen;
    showScreen(screen);
  });
});

function showScreen(screen) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelector(`.nav-item[data-screen="${screen}"]`).classList.add('active');

  usersScreen.style.display = screen === 'users' ? 'block' : 'none';
  chatScreen.classList.remove('show');
  settingsScreen.classList.remove('show');

  if (screen === 'settings') {
    settingsScreen.classList.add('show');
    bottomNav.style.display = 'flex';
  } else if (screen === 'users') {
    bottomNav.style.display = 'flex';
  }
}

// ===== 注册 =====
registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;

  try {
    const res = await fetch(`${getApiBase()}/api/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, avatar: selectedAvatar })
    });
    const data = await res.json();

    if (data.success) {
      loginSuccess(data.user);
    } else {
      showAuthError(data.error);
    }
  } catch (err) {
    showAuthError('网络错误，请检查服务器地址');
  }
});

// ===== 登录 =====
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;

  try {
    const res = await fetch(`${getApiBase()}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      loginSuccess(data.user);
    } else {
      showAuthError(data.error);
    }
  } catch (err) {
    showAuthError('网络错误，请检查服务器地址');
  }
});

function showAuthError(msg) {
  authError.textContent = msg;
  authError.classList.add('show');
}

// ===== 登录成功 =====
function loginSuccess(user) {
  currentUser = user;
  localStorage.setItem('burnchat_user', JSON.stringify(user));

  authScreen.style.display = 'none';
  appContainer.classList.add('show');

  document.getElementById('settingsUsername').textContent = user.username;

  connectWebSocket();
}

// ===== WebSocket 连接 =====
function connectWebSocket() {
  const wsUrl = getWsUrl();
  if (!wsUrl) {
    console.log('请先在设置中配置服务器地址');
    return;
  }

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', userId: currentUser.id }));
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleMessage(data);
  };

  ws.onclose = () => {
    console.log('连接断开，5秒后重连...');
    setTimeout(connectWebSocket, 5000);
  };

  ws.onerror = () => {
    showAuthError('无法连接服务器');
  };
}

// ===== 处理消息 =====
function handleMessage(data) {
  switch (data.type) {
    case 'online_list':
      onlineUsers = data.users.filter(u => u.id !== currentUser.id);
      renderUsers();
      break;

    case 'user_online':
      if (data.user.id !== currentUser.id) {
        onlineUsers.push(data.user);
        renderUsers();
      }
      break;

    case 'user_offline':
      onlineUsers = onlineUsers.filter(u => u.id !== data.userId);
      renderUsers();
      break;

    case 'message':
      receiveMessage(data);
      break;
  }
}

// ===== 渲染用户列表 =====
function renderUsers() {
  const list = document.getElementById('userList');
  document.getElementById('onlineCount').textContent = onlineUsers.length + 1;

  if (onlineUsers.length === 0) {
    document.getElementById('usersSection').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔌</div>
        <div class="empty-text">暂无其他在线用户</div>
        <div class="empty-hint">分享服务器地址给朋友</div>
      </div>
    `;
    return;
  }

  list.innerHTML = onlineUsers.map(u => `
    <div class="user-card" data-id="${u.id}">
      <div class="user-avatar online" style="background:${u.color}33">${u.avatar}</div>
      <div class="user-info">
        <div class="user-name">${u.username}</div>
        <div class="user-preview">点击开始加密对话</div>
      </div>
      <div class="user-badge">在线</div>
    </div>
  `).join('');

  list.querySelectorAll('.user-card').forEach(el => {
    el.addEventListener('click', () => openChat(el.dataset.id));
  });
}

// ===== 打开聊天 =====
function openChat(userId) {
  activeChat = userId;
  const user = onlineUsers.find(u => u.id === userId);

  usersScreen.style.display = 'none';
  chatScreen.classList.add('show');
  bottomNav.style.display = 'none';

  document.getElementById('chatAvatar').textContent = user.avatar;
  document.getElementById('chatAvatar').style.background = user.color + '33';
  document.getElementById('chatName').textContent = user.username;
  document.getElementById('chatStatus').textContent = '● 在线';
  document.getElementById('chatStatus').style.color = 'var(--accent-green)';

  document.getElementById('chatMessages').innerHTML = '';
}

// ===== 返回 =====
document.getElementById('backBtn').addEventListener('click', () => {
  chatScreen.classList.remove('show');
  usersScreen.style.display = 'block';
  bottomNav.style.display = 'flex';
  activeChat = null;
});

// ===== 发送消息 =====
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('chatInput').addEventListener('input', () => {
  document.getElementById('sendBtn').disabled = !document.getElementById('chatInput').value.trim();
});

function sendMessage() {
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content || !activeChat || !ws) return;

  ws.send(JSON.stringify({
    type: 'chat',
    toId: activeChat,
    content,
    burnAfter: burnTime
  }));

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
}

// ===== 接收消息 =====
function receiveMessage(data) {
  const container = document.getElementById('chatMessages');
  const isSent = data.sent;
  const time = new Date(data.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

  const msgId = 'msg-' + Date.now();
  const msgHTML = `
    <div class="msg-row ${isSent ? 'sent' : 'received'}" id="${msgId}">
      <div class="msg-bubble">
        ${data.content}
        <div class="msg-meta">
          <span class="msg-time">${time}</span>
          <span class="msg-burn burning">🔥 ${data.burnAfter}s</span>
        </div>
      </div>
    </div>
  `;

  container.insertAdjacentHTML('beforeend', msgHTML);
  container.scrollTop = container.scrollHeight;

  startBurnTimer(msgId, data.burnAfter);
}

// ===== 自毁倒计时 =====
function startBurnTimer(msgId, seconds) {
  let remaining = seconds;
  const el = document.getElementById(msgId);
  const burnSpan = el.querySelector('.msg-burn');

  const timer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(timer);
      burnMessage(msgId);
      return;
    }
    burnSpan.textContent = `🔥 ${remaining}s`;
  }, 1000);

  messageTimers[msgId] = timer;
}

// ===== 消息自毁 =====
function burnMessage(msgId) {
  const el = document.getElementById(msgId);
  const bubble = el.querySelector('.msg-bubble');

  bubble.classList.add('burning');

  setTimeout(() => {
    el.style.maxHeight = '0';
    el.style.overflow = 'hidden';
    el.style.margin = '0';
    el.style.transition = 'all 0.4s';
    setTimeout(() => el.remove(), 400);
  }, 1200);

  delete messageTimers[msgId];
}

// ===== 自毁时间选择 =====
document.querySelectorAll('.burn-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.burn-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    burnTime = parseInt(btn.dataset.time);
  });
});

// ===== 服务器配置 =====
document.getElementById('saveServerBtn').addEventListener('click', () => {
  const url = document.getElementById('serverUrl').value.trim();
  if (url) {
    serverUrl = url;
    localStorage.setItem('burnchat_server', url);
    localStorage.setItem('burnchat_ws', url.replace(/^http/, 'ws'));

    if (ws) ws.close();
    connectWebSocket();
  }
});

// 读取已保存的服务器地址
if (serverUrl) {
  document.getElementById('serverUrl').value = serverUrl;
}

// ===== 退出登录 =====
document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('burnchat_user');
  localStorage.removeItem('burnchat_server');
  location.reload();
});

// ===== 自动登录 =====
const savedUser = localStorage.getItem('burnchat_user');
if (savedUser) {
  try {
    const user = JSON.parse(savedUser);
    loginSuccess(user);
  } catch (e) {
    localStorage.removeItem('burnchat_user');
  }
}
</script>
</body>
</html>
